<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Ofertes.ad{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0F0F0F;--bg2:#181818;--bg3:#222;--card:#1C1C1C;
      --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
      --text:#F0EDE8;--muted:rgba(240,237,232,.45);
      --accent:#E8C547;--red:#E85454;--green:#52C97A;
      --radius:16px;--radius-sm:10px;
      --shadow:0 4px 24px rgba(0,0,0,.4);--shadow-lg:0 8px 48px rgba(0,0,0,.6);
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
    nav{position:sticky;top:0;z-index:100;background:rgba(15,15,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--accent);text-decoration:none;letter-spacing:-.5px;flex-shrink:0}
    .nav-logo span{color:var(--text)}
    .search-wrap{flex:1;max-width:480px;position:relative}
    .search-wrap input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:50px;padding:9px 20px 9px 44px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .2s,background .2s}
    .search-wrap input::placeholder{color:var(--muted)}
    .search-wrap input:focus{border-color:var(--accent);background:var(--bg2)}
    .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none}
    .dropdown{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);max-height:380px;overflow-y:auto;display:none;z-index:200}
    .dropdown.open{display:block}
    .dr-item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--border);transition:background .15s}
    .dr-item:last-child{border-bottom:none}
    .dr-item:hover{background:var(--bg3)}
    .dr-emoji{font-size:22px}
    .dr-info{flex:1;min-width:0}
    .dr-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .dr-store{font-size:11px;color:var(--muted)}
    .dr-price{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;color:var(--accent);white-space:nowrap}
    .nav-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 20px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;border:none;transition:all .2s}
    .btn-accent{background:var(--accent);color:#0F0F0F}
    .btn-accent:hover{background:#F0D870;transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
    .btn-ghost:hover{color:var(--text);background:var(--bg3)}
    .btn-danger{background:rgba(232,84,84,.12);color:var(--red);border:1px solid rgba(232,84,84,.2)}
    .btn-danger:hover{background:rgba(232,84,84,.22)}
    .btn-sm{padding:6px 14px;font-size:12px}
    .discount{display:inline-block;background:var(--red);color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:2px 8px;border-radius:50px}
    .flash{padding:12px 20px;border-radius:var(--radius-sm);margin:16px 0;font-size:14px;background:rgba(82,201,122,.1);border:1px solid rgba(82,201,122,.2);color:var(--green)}
    .section-heading{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:20px}
    footer{margin-top:80px;border-top:1px solid var(--border);padding:32px 24px;text-align:center;font-size:13px;color:var(--muted)}
    footer strong{color:var(--accent);font-family:'Syne',sans-serif}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-logo">Ofertes<span>.ad</span></a>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="gSearch" placeholder="Cerca productes o botigues..." autocomplete="off">
    <div class="dropdown" id="gDrop"></div>
  </div>
  <div class="nav-actions">
    {% if session.business_id %}
      <a href="/panel" class="btn btn-accent btn-sm">⚙ Panel</a>
      <a href="/logout" class="btn btn-ghost btn-sm">Sortir</a>
    {% else %}
      <a href="/login" class="btn btn-ghost btn-sm">Accés botigues</a>
    {% endif %}
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <div>Fet amb ❤️ per a les botigues d'<strong>Andorra</strong> · Ofertes actualitzades cada setmana</div>
</footer>

<script>
const inp=document.getElementById('gSearch'),drop=document.getElementById('gDrop');
let t;
inp.addEventListener('input',()=>{
  clearTimeout(t);
  const q=inp.value.trim();
  if(!q){drop.classList.remove('open');drop.innerHTML='';return}
  t=setTimeout(()=>doSearch(q),220);
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))drop.classList.remove('open')});
async function doSearch(q){
  const r=await fetch('/api/search?q='+encodeURIComponent(q));
  const items=await r.json();
  if(!items.length){drop.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">Sense resultats</div>';drop.classList.add('open');return}
  drop.innerHTML=items.map(o=>{
    const d=Math.round((1-o.offer_price/o.original_price)*100);
    return`<div class="dr-item" onclick="location='/negoci/${o.bid}'">
      <span class="dr-emoji">${o.emoji}</span>
      <div class="dr-info"><div class="dr-name">${o.name}</div><div class="dr-store">${o.bname} · −${d}%</div></div>
      <div class="dr-price">${o.offer_price.toFixed(2)}€</div>
    </div>`;
  }).join('');
  drop.classList.add('open');
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
